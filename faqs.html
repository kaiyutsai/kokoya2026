<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>常見問題 · 果果家 KOKOYA</title>
<link rel="icon" href="assets/logo-fallback.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .faq-row {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 14px 18px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
  }
  .faq-row.unpub { opacity: .5; }
  .faq-row .h {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
  }
  .faq-row .q {
    flex: 1; min-width: 200px;
    font-weight: 700; font-size: 1.02rem; color: var(--ink-1);
  }
  .faq-row .order-tag {
    background: var(--paper-2);
    color: var(--ink-2);
    padding: 2px 10px;
    border-radius: var(--r-pill);
    font-size: .78rem;
  }
  .faq-row .actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 700px) { .editor-grid { grid-template-columns: 1fr; } }
  .editor-grid textarea, .editor-grid input { width: 100%; }
  .editor-grid .preview {
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 14px 18px;
    min-height: 200px;
    font-size: .96rem;
    line-height: 1.7;
    color: var(--ink-1);
  }
  .editor-grid .preview h1, .editor-grid .preview h2, .editor-grid .preview h3 {
    font-family: "Noto Serif TC", serif;
    color: var(--ink-1);
    margin: 12px 0 8px;
  }
  .editor-grid .preview strong { color: var(--orange-d); }
  .editor-grid .preview ul { padding-left: 22px; }
</style>
</head>
<body>
<main class="container">
  <div class="card">
    <div class="card-h">
      <h2>❓ 常見問題管理</h2>
      <div class="flex" style="gap:8px">
        <button class="btn ghost" id="btnSeed">📥 匯入預設 3 筆</button>
        <button class="btn primary" id="btnAdd">＋ 新增 FAQ</button>
      </div>
    </div>
    <p class="muted" style="font-size:.86rem;line-height:1.7;margin-top:0">
      這裡的 Q&A 會同步顯示在購物網的「常見問題」頁。請用 <b>Markdown</b> 寫答案，支援 <b>粗體</b>、項目符號、連結等。
    </p>
    <div id="faqList">
      <div class="muted" style="text-align:center;padding:40px">載入中…</div>
    </div>
  </div>
</main>

<!-- ==== Modal ==== -->
<div class="modal-mask" id="modal">
  <div class="modal" style="max-width:920px">
    <div class="card-h" style="margin-top:0">
      <h3 id="mTitle">新增 FAQ</h3>
      <button type="button" class="btn ghost icon-only" id="btnCancel">✕</button>
    </div>
    <form id="form">
      <input type="hidden" id="fId">
      <div class="field">
        <label>問題 *</label>
        <input class="input" id="fQ" placeholder="例：💳 匯款方式是？" required>
      </div>
      <div class="field">
        <div class="flex" style="justify-content:space-between;align-items:center">
          <label style="margin:0">回答（支援 Markdown）*</label>
          <span class="muted" style="font-size:.78rem">右側為即時預覽</span>
        </div>
        <div class="editor-grid">
          <textarea class="textarea" id="fA" rows="14" placeholder="支援 **粗體**、- 項目符號、[連結](url)…" required></textarea>
          <div class="preview" id="aPreview"><span class="muted">輸入答案會在這裡預覽…</span></div>
        </div>
      </div>
      <div class="grid cols-3" style="gap:14px">
        <div class="field">
          <label>排序（小→上）</label>
          <input class="input" type="number" id="fOrder" value="0" step="1">
        </div>
        <div class="field" style="grid-column: span 2">
          <label class="checkbox">
            <input type="checkbox" id="fPublished" checked>
            <span>在購物網公開顯示</span>
          </label>
        </div>
      </div>
      <div class="flex" style="justify-content:space-between;margin-top:18px">
        <button type="button" class="btn tomato" id="btnDel" style="display:none">🗑️ 刪除</button>
        <div class="flex" style="gap:8px;margin-left:auto">
          <button type="button" class="btn ghost" id="btnCancel2">取消</button>
          <button type="submit" class="btn primary">💾 儲存</button>
        </div>
      </div>
      <p id="warn" class="muted" style="font-size:.84rem;text-align:center;margin-top:8px"></p>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { mountShell, isAdmin, toast } from "./js/app-shell.js";
  import { listFaqs, upsertFaq, deleteFaq, seedDefaultFaqs } from "./js/data.js";
  import { renderMarkdown } from "./js/markdown.js";

  const me = await mountShell({ active: "faqs" });
  const $ = id => document.getElementById(id);
  const $list = $("faqList");
  const $modal = $("modal");
  const $form = $("form");

  let cache = [];

  async function reload() {
    $list.innerHTML = `<div class="muted" style="text-align:center;padding:30px">載入中…</div>`;
    try {
      cache = await listFaqs();
      render();
    } catch (err) {
      $list.innerHTML = `<div class="muted" style="text-align:center;padding:30px;color:var(--tomato)">載入失敗：${err.message}</div>`;
    }
  }

  function render() {
    if (!cache.length) {
      $list.innerHTML = `
        <div style="text-align:center;padding:50px;background:var(--paper);border:1px dashed var(--line);border-radius:14px">
          <div style="font-size:3rem">📭</div>
          <div style="margin:8px 0 12px">還沒有 FAQ</div>
          <div class="muted" style="font-size:.86rem;line-height:1.6">
            點上方「📥 匯入預設 3 筆」可以一鍵建立<br>
            匯款方式 / 送貨方式 / 瑕疵處理 三筆預設說明
          </div>
        </div>`;
      return;
    }
    $list.innerHTML = cache.map(f => `
      <div class="faq-row${f.published===false?' unpub':''}" data-id="${f.id}">
        <div class="h">
          <span class="order-tag">#${f.order ?? 0}</span>
          <div class="q">${escapeHtml(f.question || "(無問題)")}</div>
          ${f.published === false ? '<span class="order-tag" style="background:#FBE0C2;color:#8a4720">下架中</span>' : ''}
        </div>
        <div class="actions">
          <button class="btn ghost" data-edit="${f.id}">✏️ 編輯</button>
        </div>
      </div>
    `).join("");
    $list.querySelectorAll("[data-edit]").forEach(b => {
      b.addEventListener("click", () => openModal(cache.find(x => x.id === b.dataset.edit)));
    });
  }

  function openModal(f) {
    $("mTitle").textContent = f ? "編輯 FAQ" : "新增 FAQ";
    $("fId").value = f?.id || "";
    $("fQ").value  = f?.question || "";
    $("fA").value  = f?.answer || "";
    $("fOrder").value = f?.order ?? (cache.length + 1);
    $("fPublished").checked = f ? (f.published !== false) : true;
    updatePreview();

    const $del = $("btnDel");
    if (f && isAdmin(me.email)) {
      $del.style.display = "inline-flex";
      $del.onclick = async () => {
        if (!confirm(`確定刪除「${f.question}」？`)) return;
        try {
          await deleteFaq(f.id);
          toast("已刪除", "ok");
          $modal.classList.remove("show");
          reload();
        } catch (err) { toast(err.message, "err"); }
      };
    } else {
      $del.style.display = "none";
    }
    $("warn").textContent = (f && !isAdmin(me.email)) ? "員工身份可編輯，但無法刪除（僅管理員凱宇）" : "";
    $modal.classList.add("show");
  }

  $("fA").addEventListener("input", updatePreview);
  function updatePreview() {
    const md = $("fA").value;
    $("aPreview").innerHTML = md ? renderMarkdown(md) : `<span class="muted">輸入答案會在這裡預覽…</span>`;
  }

  $("btnAdd").addEventListener("click", () => openModal(null));
  $("btnCancel").addEventListener("click", () => $modal.classList.remove("show"));
  $("btnCancel2").addEventListener("click", () => $modal.classList.remove("show"));
  $modal.addEventListener("click", e => { if (e.target === $modal) $modal.classList.remove("show"); });

  $("btnSeed").addEventListener("click", async () => {
    if (!confirm("匯入預設 3 筆 FAQ？\n（如果已有資料會被取消，避免重複）")) return;
    try {
      const n = await seedDefaultFaqs();
      toast(`✓ 已匯入 ${n} 筆`, "ok");
      reload();
    } catch (err) {
      toast(err.message, "err");
    }
  });

  $form.addEventListener("submit", async e => {
    e.preventDefault();
    const id = $("fId").value;
    const data = {
      question:  $("fQ").value.trim(),
      answer:    $("fA").value,
      order:     Number($("fOrder").value || 0),
      published: $("fPublished").checked
    };
    if (!data.question) return toast("請填問題", "err");
    if (!data.answer) return toast("請填答案", "err");
    try {
      await upsertFaq(id || null, data);
      toast(id ? "已更新" : "已新增", "ok");
      $modal.classList.remove("show");
      reload();
    } catch (err) {
      toast("儲存失敗：" + err.message, "err");
    }
  });

  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  reload();
</script>
</body>
</html>
