<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>出貨單 · 果果家 KOKOYA</title>
<link rel="icon" href="assets/logo-fallback.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<!-- html2canvas：用於把出貨單畫面轉成 JPG 下載 -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  /* ===== 列印（PDF 另存）排版 ===== */
  @media print {
    @page { size: A4 portrait; margin: 6mm; }
    body { background: #fff !important; }
    .topbar, .no-print, .toast-area, body > main, .hidden { display: none !important; }
    .container { padding: 0 !important; }
    .ship-doc {
      box-shadow: none !important;
      border: 1px solid #ddd !important;
      max-width: none !important;
      page-break-inside: avoid;
    }
    /* 多張一頁兩張模式：用 ship-slot 包，固定高度，內部自動 scale to fit */
    #bulkPrintArea .ship-slot {
      height: calc((297mm - 18mm) / 2);
      page-break-inside: avoid;
      overflow: hidden;
      margin: 0 0 6mm 0;
      position: relative;
      box-sizing: border-box;
    }
    #bulkPrintArea .ship-slot:nth-of-type(2n) {
      page-break-after: always;
      margin-bottom: 0;
    }
    #bulkPrintArea .ship-doc {
      margin: 0 !important;
      width: 100%;
      max-width: none !important;
    }
  }
  /* 螢幕 + 列印 通用：2-up slot 容器 */
  .ship-slot {
    height: 520px;  /* 螢幕預設高度（接近 138mm at 96DPI） */
    overflow: hidden;
    margin-bottom: 14px;
    border: 1px dashed #DDD;
    background: #FFFBF2;
    position: relative;
    box-sizing: border-box;
  }
  .ship-slot .ship-doc {
    transform-origin: top left;
    margin: 0;
    box-shadow: none;
  }
  /* QR + 感謝區雙欄 */
  .ship-doc .thanks-footer {
    display: flex; align-items: center; gap: 14px;
    justify-content: center; margin-top: 14px;
  }
  .ship-doc .qr-wrap { text-align: center; flex-shrink: 0; }
  .ship-doc .qr-wrap img.qr {
    width: 88px; height: 88px;
    border: 1px solid var(--line);
    padding: 3px; background: #fff;
    border-radius: 6px;
    display: block;
  }
  .ship-doc .qr-wrap .qr-label {
    font-size: .72rem; color: var(--ink-3);
    margin-top: 4px; letter-spacing: .05em;
  }
  .ship-doc .qr-wrap .qr-label b { color: var(--tomato); }
</style>
</head>
<body>
<main class="container no-print">
  <div class="grid cols-2">
    <section class="card">
      <div class="card-h"><h2>🚚 開立出貨單</h2></div>
      <form id="form" novalidate>
        <div id="editIndicator" class="hidden" style="margin-bottom:10px;padding:8px 12px;background:#FFF6E6;border-left:3px solid var(--orange);border-radius:0 8px 8px 0;font-size:.9rem">
          ✏️ 正在編輯：<b id="editTo"></b>（單號 <span id="editDocNo"></span>）
          <button type="button" class="btn ghost" id="btnCancelEdit" style="margin-left:10px;padding:4px 10px;font-size:.78rem">取消編輯</button>
        </div>
        <div class="row-fields">
          <div class="field"><label>訂購日期</label><input type="date" class="input" id="fDate" required></div>
          <div class="field"><label>經辦人員</label><select class="select" id="fHandler"></select></div>
        </div>
        <div class="row-fields">
          <div class="field"><label>收貨人 *</label><input class="input" id="fTo" required placeholder="例：王太太"></div>
          <div class="field"><label>聯絡電話</label><input class="input" id="fPhone" placeholder="0912-345-678"></div>
        </div>
        <div class="field"><label>收貨地址 *</label><input class="input" id="fAddr" required placeholder="例：高雄市鳳山區中山路 100 號"></div>

        <h3 style="margin-top:6px">出貨明細</h3>
        <div id="lines"></div>
        <button type="button" class="btn ghost" id="btnAddLine">＋ 新增一行</button>

        <div class="field" style="margin-top:14px"><label>備註 / 配送方式</label><textarea class="textarea" id="fNote" placeholder="例：宅配當日、貨到付款、易碎請小心…"></textarea></div>

        <div class="flex" style="justify-content:space-between;border-top:1px dashed var(--line);padding-top:14px">
          <div class="muted">合計</div>
          <div style="font-size:1.4rem;font-weight:700;color:var(--tomato)" id="total">$0</div>
        </div>

        <div class="flex" style="justify-content:flex-end;margin-top:14px">
          <button type="reset" class="btn ghost" id="btnReset">清空</button>
          <button type="submit" class="btn tomato" id="btnSubmit">💾 建立並預覽列印</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="card-h"><h2>📒 近 60 天出貨單</h2>
        <input class="input" id="kw" placeholder="🔍 搜尋收貨人/單號" style="width:200px">
      </div>
      <div class="flex" style="margin-bottom:10px;flex-wrap:wrap;gap:8px">
        <span class="muted" id="selCount">勾選 0 張</span>
        <button class="btn primary" id="btnBulkPdf" disabled style="margin-left:auto">📄 下載 PDF (一頁兩張)</button>
      </div>
      <div class="table-wrap">
        <table class="tb">
          <thead><tr>
            <th style="width:34px"><input type="checkbox" id="checkAll" title="全選"></th>
            <th>單號</th><th>日期</th><th>收貨人</th><th class="num">金額</th><th></th>
          </tr></thead>
          <tbody id="rows"><tr><td colspan="6" class="empty">載入中…</td></tr></tbody>
        </table>
      </div>
    </section>
  </div>
</main>

<!-- 列印預覽區 -->
<section id="printArea" class="container hidden" style="padding-top:30px">
  <div class="no-print flex" style="justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap">
    <label class="flex" style="gap:6px;font-size:.92rem;cursor:pointer">
      <input type="checkbox" id="toggleNote" style="width:auto"> 顯示備註
    </label>
    <div class="flex" style="gap:8px;flex-wrap:wrap">
      <button class="btn ghost" id="btnBack">← 返回</button>
      <button class="btn ghost" id="btnDownloadJpg">📷 下載圖片 (JPG)</button>
      <button class="btn ghost" id="btnDownloadDoc">📥 下載 Word (.doc)</button>
      <button class="btn primary" id="btnPrint">🖨 列印 / 另存 PDF</button>
    </div>
  </div>
  <div id="doc"></div>
</section>

<!-- 多張一次列印區（A4 一頁兩張） -->
<section id="bulkPrintArea" class="container hidden" style="padding-top:30px">
  <div class="no-print flex" style="justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap">
    <div class="flex" style="gap:14px;flex-wrap:wrap">
      <span class="muted" id="bulkInfo">共 0 張 · A4 一頁兩張</span>
      <label class="flex" style="gap:6px;font-size:.92rem;cursor:pointer">
        <input type="checkbox" id="bulkToggleNote" style="width:auto"> 顯示備註
      </label>
    </div>
    <div class="flex" style="gap:8px;flex-wrap:wrap">
      <button class="btn ghost" id="btnBulkBack">← 返回</button>
      <button class="btn primary" id="btnBulkPrint">🖨 列印 / 另存 PDF</button>
    </div>
  </div>
  <div id="bulkDocs"></div>
</section>

<script type="module">
  import { mountShell, toast, fmt, isAdmin } from "./js/app-shell.js";
  import { listItems, addShipment, listShipments, getShipment, deleteShipment, updateShipment, getLookups } from "./js/data.js";

  const me = await mountShell({ active: "shipping" });
  document.getElementById("fDate").value = fmt.dateInput(new Date());

  // 經辦人 select 從 lookups 撈
  const lookups = await getLookups().catch(() => ({ handlers: ["凱宇","凱帆","妍慧","于真"] }));
  document.getElementById("fHandler").innerHTML =
    (lookups.handlers || []).map(n => `<option value="${n}">${n}</option>`).join("");
  document.getElementById("fHandler").value = (lookups.handlers||[]).includes(me.name) ? me.name : (lookups.handlers||[])[0] || "";

  let items = await listItems();
  let cache = [];
  let editingId = null;

  const $lines = document.getElementById("lines");
  const $rows  = document.getElementById("rows");
  const $kw    = document.getElementById("kw");

  function lineRow() {
    const opts = items.map(i => `<option value="${i.id}" data-name="${i.name}" data-unit="${i.unit||''}" data-price="${i.price||0}">${i.name}</option>`).join("");
    return `
      <div class="row-fields line-row" style="margin-bottom:8px;align-items:end">
        <div class="field" style="margin-bottom:0"><label>品項</label>
          <select class="select sl-item" required><option value="">請選擇</option>${opts}</select>
        </div>
        <div class="field" style="margin-bottom:0"><label>數量</label>
          <input class="input sl-qty" type="number" min="1" step="1" value="1" required></div>
        <div class="field" style="margin-bottom:0"><label>單位</label>
          <input class="input sl-unit" placeholder="箱"></div>
        <div class="field" style="margin-bottom:0"><label>單價</label>
          <input class="input sl-price" type="number" min="0" step="1" required></div>
        <div class="field" style="margin-bottom:0"><label>小計</label>
          <input class="input sl-sub" readonly tabindex="-1"></div>
        <div><button type="button" class="btn ghost icon-only sl-del">✕</button></div>
      </div>`;
  }
  function bindRow(row) {
    const sl = row.querySelector(".sl-item");
    sl.addEventListener("change", () => {
      const o = sl.selectedOptions[0];
      row.querySelector(".sl-unit").value  = o?.dataset.unit || "";
      row.querySelector(".sl-price").value = o?.dataset.price || 0;
      recalc();
    });
    row.querySelector(".sl-qty").addEventListener("input", recalc);
    row.querySelector(".sl-price").addEventListener("input", recalc);
    row.querySelector(".sl-del").addEventListener("click", () => { row.remove(); recalc(); });
  }
  function recalc() {
    let total = 0;
    [...$lines.querySelectorAll(".line-row")].forEach(r => {
      const q = Number(r.querySelector(".sl-qty").value)||0;
      const p = Number(r.querySelector(".sl-price").value)||0;
      r.querySelector(".sl-sub").value = (q*p).toLocaleString();
      total += q*p;
    });
    document.getElementById("total").textContent = fmt.money(total);
  }
  function addLine() {
    $lines.insertAdjacentHTML("beforeend", lineRow());
    bindRow($lines.lastElementChild);
    recalc();
  }
  document.getElementById("btnAddLine").addEventListener("click", addLine);
  addLine();

  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const lines = [...$lines.querySelectorAll(".line-row")].map(r => ({
      itemId: r.querySelector(".sl-item").value,
      name:   r.querySelector(".sl-item").selectedOptions[0]?.dataset.name || "",
      unit:   r.querySelector(".sl-unit").value,
      qty:    Number(r.querySelector(".sl-qty").value)||0,
      price:  Number(r.querySelector(".sl-price").value)||0
    })).filter(l => l.itemId && l.qty > 0);
    if (!lines.length) return toast("請至少加一個品項", "err");

    const payload = {
      date: new Date(document.getElementById("fDate").value),
      recipient: document.getElementById("fTo").value.trim(),
      phone:     document.getElementById("fPhone").value.trim(),
      address:   document.getElementById("fAddr").value.trim(),
      handlerName: document.getElementById("fHandler").value.trim() || me.name,
      note:      document.getElementById("fNote").value,
      lines
    };

    try {
      let docId, docNoMsg;
      if (editingId) {
        await updateShipment(editingId, payload);
        docId = editingId;
        docNoMsg = "已更新";
        toast(`✓ 出貨單 ${docNoMsg}`, "ok");
      } else {
        const r = await addShipment(payload);
        docId = r.id;
        docNoMsg = r.docNo;
        toast(`✓ 出貨單 ${docNoMsg} 已建立`, "ok");
      }
      exitEditMode();
      reload();
      previewDoc(docId);
    } catch (err) { console.error(err); toast((editingId ? "更新" : "建立") + "失敗：" + err.message, "err"); }
  });

  // ----- 編輯模式 -----
  function enterEditMode(s) {
    editingId = s.id;
    document.getElementById("fDate").value = fmt.dateInput(s.date);
    document.getElementById("fHandler").value = s.handlerName || s.createdByName || me.name;
    document.getElementById("fTo").value = s.recipient || "";
    document.getElementById("fPhone").value = s.phone || "";
    document.getElementById("fAddr").value = s.address || "";
    document.getElementById("fNote").value = s.note || "";
    // 重建 lines
    $lines.innerHTML = "";
    (s.lines || []).forEach(l => {
      addLine();
      const row = $lines.lastElementChild;
      const sl = row.querySelector(".sl-item");
      sl.value = l.itemId || "";
      sl.dispatchEvent(new Event("change"));
      // 覆蓋成儲存的值
      row.querySelector(".sl-unit").value  = l.unit  || "";
      row.querySelector(".sl-qty").value   = l.qty   || 1;
      row.querySelector(".sl-price").value = l.price || 0;
      row.querySelector(".sl-qty").dispatchEvent(new Event("input"));
    });
    if (!s.lines?.length) addLine();

    document.getElementById("editIndicator").classList.remove("hidden");
    document.getElementById("editTo").textContent = s.recipient || "(無收貨人)";
    document.getElementById("editDocNo").textContent = s.docNo || "—";
    document.getElementById("btnSubmit").textContent = "💾 儲存修改";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function exitEditMode() {
    editingId = null;
    document.getElementById("editIndicator").classList.add("hidden");
    document.getElementById("btnSubmit").textContent = "💾 建立並預覽列印";
  }

  document.getElementById("btnCancelEdit").addEventListener("click", () => {
    exitEditMode();
    resetForm();
  });
  document.getElementById("btnReset").addEventListener("click", () => {
    setTimeout(() => { resetForm(); exitEditMode(); }, 10);
  });

  function resetForm() {
    document.getElementById("fDate").value = fmt.dateInput(new Date());
    document.getElementById("fHandler").value = me.name;
    $lines.innerHTML = ""; addLine();
  }

  // 載入清單
  async function reload() {
    cache = await listShipments({ days: 60 });
    render();
  }
  function render() {
    const kw = $kw.value.trim();
    let list = cache;
    if (kw) list = list.filter(s => (s.recipient||"").includes(kw) || (s.docNo||"").includes(kw));
    if (!list.length) {
      $rows.innerHTML = `<tr><td colspan="6" class="empty">尚無紀錄</td></tr>`;
      updateSelCount();
      return;
    }
    $rows.innerHTML = list.map(s => `
      <tr>
        <td><input type="checkbox" data-sel="${s.id}"></td>
        <td><b>${s.docNo}</b></td>
        <td>${fmt.date(s.date)}</td>
        <td>${s.recipient || "—"}</td>
        <td class="num">${fmt.money(s.total)}</td>
        <td class="right flex" style="justify-content:flex-end;gap:4px">
          <button class="btn ghost icon-only" data-edit="${s.id}" title="編輯改單">✎</button>
          <button class="btn ghost icon-only" data-view="${s.id}" title="預覽列印">🖨</button>
          ${isAdmin(me.email) ? `<button class="btn ghost icon-only" data-del="${s.id}" title="刪除">🗑</button>` : ""}
        </td>
      </tr>`).join("");
    updateSelCount();
  }

  function updateSelCount() {
    const n = document.querySelectorAll("[data-sel]:checked").length;
    document.getElementById("selCount").textContent = `勾選 ${n} 張`;
    document.getElementById("btnBulkPdf").disabled = (n === 0);
  }
  document.getElementById("checkAll").addEventListener("change", e => {
    document.querySelectorAll("[data-sel]").forEach(cb => cb.checked = e.target.checked);
    updateSelCount();
  });
  $rows.addEventListener("change", e => {
    if (e.target.matches("[data-sel]")) updateSelCount();
  });
  $kw.addEventListener("input", render);
  $rows.addEventListener("click", async (e) => {
    const view = e.target.closest("[data-view]")?.dataset.view;
    const del  = e.target.closest("[data-del]")?.dataset.del;
    const edit = e.target.closest("[data-edit]")?.dataset.edit;
    if (edit) {
      const s = cache.find(x => x.id === edit);
      if (s) enterEditMode(s); else toast("找不到該筆出貨單", "err");
      return;
    }
    if (view) previewDoc(view);
    if (del && confirm("確定刪除這筆出貨單？")) {
      try {
        await deleteShipment(del);
        toast("已刪除", "ok");
        if (editingId === del) exitEditMode();
        reload();
      } catch (err){ toast(err.message, "err"); }
    }
  });

  // ----- 預覽列印 -----
  const $form  = document.querySelector("main");
  const $print = document.getElementById("printArea");
  let currentShipment = null;
  document.getElementById("btnBack").addEventListener("click", () => {
    $print.classList.add("hidden"); $form.classList.remove("hidden");
  });
  document.getElementById("btnPrint").addEventListener("click", () => window.print());

  // 下載 JPG（用 html2canvas）
  document.getElementById("btnDownloadJpg").addEventListener("click", async () => {
    if (!currentShipment) return;
    if (typeof html2canvas !== "function") { toast("html2canvas 未載入，請檢查網路", "err"); return; }
    const $doc = document.querySelector("#doc .ship-doc");
    if (!$doc) { toast("找不到出貨單元素", "err"); return; }
    const $btn = document.getElementById("btnDownloadJpg");
    $btn.disabled = true;
    $btn.textContent = "⏳ 產生中…";
    try {
      const canvas = await html2canvas($doc, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
      const link = document.createElement("a");
      link.download = `${currentShipment.docNo}_${currentShipment.recipient || "出貨單"}.jpg`;
      link.href = canvas.toDataURL("image/jpeg", 0.95);
      document.body.appendChild(link);
      link.click();
      setTimeout(() => link.remove(), 100);
      toast("✓ JPG 已下載", "ok");
    } catch (err) {
      console.error(err);
      toast("產生 JPG 失敗：" + err.message, "err");
    }
    $btn.disabled = false;
    $btn.textContent = "📷 下載圖片 (JPG)";
  });

  // 下載 Word（.doc）— 用 HTML+Word MIME 的 trick，Word 開啟後可另存為 .docx
  document.getElementById("btnDownloadDoc").addEventListener("click", () => {
    if (!currentShipment) return;
    const $doc = document.querySelector("#doc .ship-doc");
    if (!$doc) { toast("找不到出貨單元素", "err"); return; }
    // 拿掉 img（Word 解不到相對路徑，移除避免破圖框）
    let docHTML = $doc.outerHTML.replace(/<img[^>]*>/g, "");
    const wordHTML = `<!DOCTYPE html>
<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
<head>
<meta charset='utf-8'>
<title>出貨單 ${currentShipment.docNo}</title>
<style>
  body { font-family: 'Microsoft JhengHei', '微軟正黑體', PMingLiU, serif; padding: 20px; color: #4A3325; }
  .ship-doc { padding: 0; }
  .ship-doc .head { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #4A3325; padding-bottom: 14px; }
  .ship-doc .title { font-size: 24pt; font-weight: 700; letter-spacing: 0.4em; }
  .ship-doc .sub { font-size: 10pt; color: #8B7355; letter-spacing: 0.3em; }
  .ship-doc .meta { margin-bottom: 18px; }
  .ship-doc .meta > div { display: inline-block; margin: 0 30px 10px 0; }
  .ship-doc .meta .lbl { font-size: 9pt; color: #8B7355; }
  .ship-doc .meta .val { font-size: 11pt; font-weight: 500; }
  table { width: 100%; border-collapse: collapse; margin: 10px 0; }
  table th, table td { border: 1px solid #888; padding: 6px 8px; font-size: 10pt; }
  table th { background: #F2EADB; }
  table td.num, table th.num { text-align: right; }
  .totals { text-align: right; margin-top: 12px; }
  .totals .row { font-size: 10pt; padding: 4px 0; }
  .totals .grand { font-size: 14pt; font-weight: 700; border-top: 2px solid #4A3325; padding-top: 8px; color: #C97B63; }
  .signs { margin-top: 50px; }
  .signs .sig { display: inline-block; width: 30%; border-top: 1px solid #4A3325; padding-top: 6px; font-size: 9pt; text-align: center; margin-right: 3%; }
</style>
</head>
<body>
${docHTML}
</body>
</html>`;
    const blob = new Blob(["﻿", wordHTML], { type: "application/msword" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `${currentShipment.docNo}_${currentShipment.recipient || "出貨單"}.doc`;
    document.body.appendChild(link);
    link.click();
    setTimeout(() => { link.remove(); URL.revokeObjectURL(url); }, 100);
    toast("✓ Word 檔已下載", "ok");
  });

  // FB 社團 QR：使用 assets/fb-qr.png 靜態圖（先轉 base64 確保 html2canvas 能正確渲染）
  let fbQrDataUrl = "";
  try {
    const res = await fetch("assets/fb-qr.png");
    if (res.ok) {
      const blob = await res.blob();
      fbQrDataUrl = await new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload  = () => resolve(fr.result);
        fr.onerror = reject;
        fr.readAsDataURL(blob);
      });
    }
  } catch (e) { console.warn("FB QR 載入失敗", e); }

  // 共用：把 shipment 物件轉成出貨單 HTML（給單張預覽 + 多張列印共用）
  function renderShipDocHtml(s, includeNote) {
    const linesHtml = (s.lines || []).map((l, i) => `
      <tr>
        <td>${i+1}</td>
        <td>${l.name}</td>
        <td class="num">${fmt.num(l.qty)}</td>
        <td>${l.unit||""}</td>
        <td class="num">${fmt.money(l.price)}</td>
        <td class="num">${fmt.money(Number(l.qty)*Number(l.price))}</td>
      </tr>`).join("");
    const hasPhone   = s.phone && s.phone.trim();
    const hasAddress = s.address && s.address.trim();
    const showNote   = includeNote && s.note;
    const qrHtml = fbQrDataUrl
      ? `<div class="qr-wrap"><img class="qr" src="${fbQrDataUrl}" alt="FB 社團"><div class="qr-label">掃 QR 加入<br><b>果果家 FB 社團</b></div></div>`
      : "";
    return `
      <div class="ship-doc">
        <img class="watermark" src="assets/logo-clean.png" onerror="this.onerror=null;this.src='assets/logo-fallback.svg';" alt="">

        <div class="head">
          <div>
            <div class="title">出 貨 單</div>
            <div class="sub">SHIPPING NOTE</div>
          </div>
          <div style="text-align:right">
            <img class="head-logo" src="assets/logo-clean.png" onerror="this.onerror=null;this.src='assets/logo-fallback.svg';" style="height:180px" alt="果果家 KOKOYA">
          </div>
        </div>

        <div class="meta">
          <div><div class="lbl">單號</div><div class="val">${s.docNo}</div></div>
          <div><div class="lbl">訂購日期</div><div class="val">${fmt.date(s.date)}</div></div>
          <div><div class="lbl">收貨人</div><div class="val">${s.recipient||"—"}</div></div>
          ${hasPhone ? `<div><div class="lbl">聯絡電話</div><div class="val">${s.phone}</div></div>` : ""}
          ${hasAddress ? `<div style="grid-column:1/-1"><div class="lbl">收貨地址</div><div class="val">${s.address}</div></div>` : ""}
        </div>

        <table>
          <thead>
            <tr><th style="width:40px">#</th><th>品項</th><th class="num" style="width:80px">數量</th><th style="width:60px">單位</th><th class="num" style="width:90px">單價</th><th class="num" style="width:110px">小計</th></tr>
          </thead>
          <tbody>${linesHtml}</tbody>
        </table>

        <div class="totals">
          <div class="row">合計品項：${(s.lines||[]).length} 項　共 ${fmt.num((s.lines||[]).reduce((a,b)=>a+Number(b.qty),0))} 件</div>
          <div class="grand">總計　${fmt.money(s.total)}</div>
        </div>

        ${showNote ? `<div class="doc-note" style="margin-top:18px;padding:10px 14px;border-left:3px solid var(--orange);background:var(--paper-2);border-radius:0 8px 8px 0;font-size:.92rem">備註：${s.note}</div>` : ""}

        <div class="thanks">
          <div class="msg">🍎 感謝您的購買 ❤️ 果果家 KOKOYA 感謝您 🍎</div>
          <div class="sub">新鮮直送 · 用心挑選 · 期待再次相遇</div>
          <div class="thanks-footer">
            ${qrHtml}
          </div>
        </div>
      </div>`;
  }

  async function previewDoc(id) {
    const s = await getShipment(id);
    if (!s) return toast("找不到此出貨單", "err");
    currentShipment = s;
    const includeNote = document.getElementById("toggleNote").checked;
    document.getElementById("doc").innerHTML = renderShipDocHtml(s, includeNote);
    $form.classList.add("hidden");
    $print.classList.remove("hidden");
    window.scrollTo(0, 0);
  }

  // 備註勾選切換 → 重畫
  document.getElementById("toggleNote").addEventListener("change", () => {
    if (currentShipment) {
      const includeNote = document.getElementById("toggleNote").checked;
      document.getElementById("doc").innerHTML = renderShipDocHtml(currentShipment, includeNote);
    }
  });

  // ----- 多張一次列印 (A4 一頁兩張) -----
  const $bulk = document.getElementById("bulkPrintArea");
  let bulkShipsCache = [];

  // 切換備註 → 重新渲染 bulkDocs
  document.getElementById("bulkToggleNote").addEventListener("change", () => {
    if (!bulkShipsCache.length) return;
    const includeNote = document.getElementById("bulkToggleNote").checked;
    document.getElementById("bulkDocs").innerHTML = bulkShipsCache.map(s =>
      `<div class="ship-slot">${renderShipDocHtml(s, includeNote)}</div>`
    ).join("");
    setTimeout(fitDocsToSlots, 200);
  });
  document.getElementById("btnBulkPdf").addEventListener("click", async () => {
    const ids = [...document.querySelectorAll("[data-sel]:checked")].map(c => c.dataset.sel);
    if (!ids.length) return toast("請先勾選要下載的出貨單", "err");
    const $btn = document.getElementById("btnBulkPdf");
    $btn.disabled = true;
    $btn.textContent = "⏳ 載入中…";
    try {
      const ships = await Promise.all(ids.map(id => getShipment(id)));
      const valid = ships.filter(Boolean);
      bulkShipsCache = valid;
      const includeNote = document.getElementById("bulkToggleNote").checked;
      document.getElementById("bulkDocs").innerHTML = valid.map(s =>
        `<div class="ship-slot">${renderShipDocHtml(s, includeNote)}</div>`
      ).join("");
      document.getElementById("bulkInfo").textContent = `共 ${valid.length} 張 · A4 一頁兩張，按列印後在「目的地」選「另存為 PDF」`;
      $form.classList.add("hidden");
      $print.classList.add("hidden");
      $bulk.classList.remove("hidden");
      window.scrollTo(0, 0);
      // 等 LOGO/QR 圖片載入後再縮放
      setTimeout(fitDocsToSlots, 250);
    } catch (err) {
      console.error(err);
      toast("載入失敗：" + err.message, "err");
    }
    $btn.disabled = (document.querySelectorAll("[data-sel]:checked").length === 0);
    $btn.textContent = "📄 下載 PDF (一頁兩張)";
  });

  document.getElementById("btnBulkBack").addEventListener("click", () => {
    $bulk.classList.add("hidden");
    $form.classList.remove("hidden");
  });
  document.getElementById("btnBulkPrint").addEventListener("click", () => {
    fitDocsToSlots();      // 列印前再算一次（針對列印時不同的 mm 尺寸）
    setTimeout(() => window.print(), 80);
  });

  // ✨ 把每個 .ship-doc 縮放到 .ship-slot 內，確保不被裁切
  // 在螢幕和列印前都呼叫。列印時 slot 高度由 mm 決定，先用 px 量再 scale 也夠用
  function fitDocsToSlots() {
    document.querySelectorAll('#bulkPrintArea .ship-slot').forEach(slot => {
      const doc = slot.querySelector('.ship-doc');
      if (!doc) return;
      // 重置
      doc.style.transform = '';
      doc.style.width = '';
      // 量自然高度 / slot 內寬
      const naturalH = doc.offsetHeight;
      const slotH = slot.clientHeight;
      const slotW = slot.clientWidth;
      const naturalW = doc.offsetWidth;
      // 取高度與寬度兩個比例的較小者
      const scaleH = slotH / naturalH;
      const scaleW = slotW / naturalW;
      const scale = Math.min(1, scaleH, scaleW);
      if (scale < 1) {
        doc.style.transform = `scale(${scale})`;
        doc.style.width = `${100 / scale}%`;
      }
    });
  }
  // 列印對話框開啟前，再算一次（瀏覽器這時用的是 mm 尺寸）
  window.addEventListener('beforeprint', fitDocsToSlots);
  window.addEventListener('resize', () => {
    if (!$bulk.classList.contains('hidden')) fitDocsToSlots();
  });

  reload();
</script>
</body>
</html>
