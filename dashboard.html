<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>主控台 · 果果家 KOKOYA</title>
<link rel="icon" href="assets/logo-fallback.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="container">
  <!-- 網站訂單通知（有未處理才顯示） -->
  <a href="web-orders.html" id="webOrderAlert" class="card hidden" style="text-decoration:none;display:block;margin-bottom:14px;border-left:5px solid var(--orange);background:linear-gradient(90deg,#FFF6E6,#FFFBF2);padding:14px 22px">
    <div class="flex" style="align-items:center;gap:14px">
      <div style="font-size:2.2rem">📨</div>
      <div style="flex:1">
        <div style="font-weight:700;color:var(--ink-1);font-size:1.05rem">
          有 <span id="webOrderCnt" style="color:var(--tomato);font-size:1.3rem">0</span> 筆購物網訂單待處理
        </div>
        <div class="muted" style="font-size:.86rem">點此前往「網站訂單」處理 →</div>
      </div>
      <div class="btn primary">前往處理 →</div>
    </div>
  </a>

  <div class="grid cols-4" id="stats">
    <div class="stat accent-orange"><div class="label">今日營收</div><div class="value" id="sToday">—</div><div class="delta">含 <span id="sTodayCnt">0</span> 筆銷售</div><div class="ico">🍊</div></div>
    <div class="stat accent-tomato"><div class="label">本月營收</div><div class="value" id="sMonth">—</div><div class="delta">利潤 <span id="sMonthProfit">—</span></div><div class="ico">🍎</div></div>
    <div class="stat accent-leaf"><div class="label">本月進貨成本</div><div class="value" id="sCost">—</div><div class="delta">共 <span id="sPurchaseCnt">0</span> 筆</div><div class="ico">📦</div></div>
    <div class="stat accent-lemon"><div class="label">低庫存品項</div><div class="value" id="sLow">—</div><div class="delta" id="sLowList">無</div><div class="ico">⚠️</div></div>
  </div>

  <div class="grid cols-2" style="margin-top:20px">
    <section class="card">
      <div class="card-h"><h2>近 7 天銷售</h2><a href="reports.html" class="muted">完整報表 →</a></div>
      <canvas id="ch7" height="160"></canvas>
    </section>

    <section class="card">
      <div class="card-h"><h2>熱賣品項（本月）</h2><a href="sales.html" class="muted">前往銷貨 →</a></div>
      <div id="topItems"><div class="loader"></div></div>
    </section>
  </div>

  <!-- 補貨建議（依銷售速度推算剩幾天會售完） -->
  <section class="card" id="restockSection" style="margin-top:18px;display:none">
    <div class="card-h">
      <h2>🛒 補貨建議 <span class="muted" id="restockHint" style="font-size:.84rem;font-weight:400">依近 30 天銷售速度推算</span></h2>
      <a href="purchase.html" class="muted">前往進貨 →</a>
    </div>
    <div class="table-wrap">
      <table class="tb">
        <thead><tr><th>品項</th><th class="num">目前庫存</th><th class="num">日均銷售</th><th class="num">預估剩餘天數</th><th>建議</th></tr></thead>
        <tbody id="restockList"></tbody>
      </table>
    </div>
  </section>

  <section class="card" style="margin-top:18px">
    <div class="card-h">
      <h2>📦 庫存清單</h2>
      <a href="items.html" class="muted">前往管理 →</a>
    </div>
    <div class="table-wrap">
      <table class="tb">
        <thead>
          <tr>
            <th>品項</th>
            <th>單位</th>
            <th class="num">建議售價</th>
            <th class="num">平均成本</th>
            <th class="num">目前庫存</th>
            <th>狀態</th>
          </tr>
        </thead>
        <tbody id="invList"><tr><td colspan="6" class="empty">載入中…</td></tr></tbody>
      </table>
    </div>
  </section>

  <section class="card" style="margin-top:18px">
    <div class="card-h"><h2>最近銷貨</h2><a href="sales.html" class="btn primary">＋ 新增銷貨</a></div>
    <div class="table-wrap">
      <table class="tb">
        <thead><tr><th>日期</th><th>客人</th><th>品項</th><th class="num">總金額</th><th>經辦</th></tr></thead>
        <tbody id="recent"><tr><td colspan="5" class="empty">載入中…</td></tr></tbody>
      </table>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script type="module">
  import { mountShell, fmt } from "./js/app-shell.js";
  import { listSales, listPurchases, listItems, watchWebOrders } from "./js/data.js";

  await mountShell({ active: "dashboard" });

  // 監聽網站訂單，有「new」就顯示提示
  watchWebOrders((list) => {
    const newCnt = list.filter(o => (o.status || "new") === "new").length;
    const $alert = document.getElementById("webOrderAlert");
    document.getElementById("webOrderCnt").textContent = newCnt;
    if (newCnt > 0) $alert.classList.remove("hidden");
    else $alert.classList.add("hidden");
  });

  const [sales, purchases, items] = await Promise.all([
    listSales({ days: 35 }),
    listPurchases({ days: 35 }),
    listItems()
  ]);

  // ---- 今日 ----
  const isSameDay = (a,b) => {
    const da = a.toDate ? a.toDate() : new Date(a);
    return da.getFullYear()===b.getFullYear() && da.getMonth()===b.getMonth() && da.getDate()===b.getDate();
  };
  const today = new Date();
  const todaySales = sales.filter(s => isSameDay(s.date, today));
  document.getElementById("sToday").textContent = fmt.money(todaySales.reduce((s,x)=>s+x.total,0));
  document.getElementById("sTodayCnt").textContent = todaySales.length;

  // ---- 本月 ----
  const monthKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}`;
  const inMonth = (s) => fmt.monthKey(s.date) === monthKey;
  const monthSales = sales.filter(inMonth);
  const monthPurchases = purchases.filter(inMonth);
  const monthRev = monthSales.reduce((a,b)=>a+b.total,0);
  const monthPurchaseTotal = monthPurchases.reduce((a,b)=>a+(b.total||0),0);
  // 利潤 = 本月營收 − 本月進貨成本
  const monthProfit = monthRev - monthPurchaseTotal;
  document.getElementById("sMonth").textContent = fmt.money(monthRev);
  document.getElementById("sMonthProfit").textContent = fmt.money(monthProfit);

  document.getElementById("sCost").textContent = fmt.money(monthPurchaseTotal);
  document.getElementById("sPurchaseCnt").textContent = monthPurchases.length;

  // ---- 低庫存 (<= 5) ----
  const low = items.filter(i => Number(i.stock||0) <= Number(i.lowStock ?? 5));
  document.getElementById("sLow").textContent = low.length;
  document.getElementById("sLowList").textContent = low.length ? low.slice(0,4).map(i=>i.name).join("、") + (low.length>4?` 等 ${low.length} 項`:"") : "庫存充足";

  // ---- 近 7 天 折線 ----
  const days = [];
  const dailyTotals = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    days.push(label);
    dailyTotals.push(sales.filter(s=>isSameDay(s.date,d)).reduce((a,b)=>a+b.total,0));
  }
  new Chart(document.getElementById("ch7"), {
    type: "line",
    data: { labels: days, datasets: [{
      label: "銷售額", data: dailyTotals,
      borderColor: "#DD8E5C", backgroundColor: "rgba(232,168,124,.18)",
      fill: true, tension: .35, borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: "#C97B63"
    }]},
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { callback: v => "$"+v } } }
    }
  });

  // ---- 本月熱賣 ----
  const topMap = {};
  monthSales.forEach(s => (s.lines||[]).forEach(l => {
    topMap[l.name] = (topMap[l.name]||0) + Number(l.qty);
  }));
  const top = Object.entries(topMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById("topItems").innerHTML = top.length
    ? `<table class="tb"><tbody>${top.map(([n,q],i)=>`
        <tr><td style="width:40px">${["🥇","🥈","🥉","④","⑤"][i]}</td>
            <td>${n}</td><td class="num">${fmt.num(q)} 份</td></tr>`).join("")}
       </tbody></table>`
    : `<p class="muted center">本月尚無銷售紀錄</p>`;

  // ---- 庫存清單（含售完，按狀態排序：低庫存 → 充足 → 售完） ----
  const sortedItems = [...items].sort((a, b) => {
    const aS = Number(a.stock||0), bS = Number(b.stock||0);
    const aLow = aS > 0 && aS <= Number(a.lowStock ?? 5);
    const bLow = bS > 0 && bS <= Number(b.lowStock ?? 5);
    const score = (s, low) => s <= 0 ? 2 : low ? 0 : 1;  // 0:低 1:充足 2:售完
    const diff = score(aS, aLow) - score(bS, bLow);
    if (diff !== 0) return diff;
    return (a.name||"").localeCompare(b.name||"", "zh-Hant");
  });
  document.getElementById("invList").innerHTML = sortedItems.length
    ? sortedItems.map(i => {
        const stock = Number(i.stock||0);
        const low = Number(i.lowStock ?? 5);
        const status = stock <= 0 ? `<span class="tag out">售完</span>`
                     : stock <= low ? `<span class="tag warn">低庫存</span>`
                     : `<span class="tag ok">充足</span>`;
        return `<tr>
          <td><b>${i.name||""}</b>${i.category?` <span class="muted">· ${i.category}</span>`:""}</td>
          <td>${i.unit||"—"}</td>
          <td class="num">${i.price ? fmt.money(i.price) : "—"}</td>
          <td class="num">${i.avgCost ? fmt.money(Math.round(i.avgCost*100)/100) : "—"}</td>
          <td class="num"><b>${fmt.num(stock)}</b> ${i.unit||""}</td>
          <td>${status}</td>
        </tr>`;
      }).join("")
    : `<tr><td colspan="6" class="empty">尚無品項，去「品項清單」新增</td></tr>`;

  // ---- 補貨建議（依近 30 天銷售速度推算每個品項剩幾天會售完） ----
  const last30Sales = sales.filter(s => {
    const d = s.date.toDate ? s.date.toDate() : new Date(s.date);
    const diff = (today - d) / 86400000;
    return diff >= 0 && diff <= 30;
  });
  // 每個 itemId 30 天賣多少
  const qty30By = {};
  last30Sales.forEach(s => (s.lines||[]).forEach(l => {
    if (!l.itemId) return;
    qty30By[l.itemId] = (qty30By[l.itemId] || 0) + (Number(l.qty) || 0);
  }));
  // 算每項剩幾天 + 排序
  const restock = items
    .filter(i => i.visible !== false)
    .map(i => {
      const sold30 = qty30By[i.id] || 0;
      const dailyRate = sold30 / 30;
      const stock = Number(i.stock || 0);
      const daysLeft = dailyRate > 0 ? Math.floor(stock / dailyRate) : null;
      return { ...i, sold30, dailyRate, daysLeft };
    })
    .filter(r => {
      // 顯示條件：日均 > 0 且 (剩 ≤ 7 天 OR 已售完且最近賣得不錯)
      if (r.dailyRate <= 0) return false;
      if (Number(r.stock || 0) <= 0) return true;
      return r.daysLeft !== null && r.daysLeft <= 7;
    })
    .sort((a,b) => (a.daysLeft ?? 999) - (b.daysLeft ?? 999));

  if (restock.length) {
    document.getElementById("restockSection").style.display = "block";
    document.getElementById("restockList").innerHTML = restock.map(r => {
      const stk = Number(r.stock || 0);
      const tag = stk <= 0 ? `<span class="tag out">已售完！立即補</span>`
                 : r.daysLeft <= 2 ? `<span class="tag" style="background:#FFD9D2;color:var(--tomato)">2 天內售完</span>`
                 : r.daysLeft <= 5 ? `<span class="tag warn">建議補貨</span>`
                 : `<span class="tag" style="background:#FFF2C9;color:#B07418">注意觀察</span>`;
      return `<tr>
        <td><b>${r.name}</b>${r.category?` <span class="muted">· ${r.category}</span>`:""}</td>
        <td class="num">${fmt.num(stk)} ${r.unit||""}</td>
        <td class="num">${r.dailyRate.toFixed(1)} ${r.unit||""}/天</td>
        <td class="num">${stk <= 0 ? "—" : r.daysLeft + " 天"}</td>
        <td>${tag}</td>
      </tr>`;
    }).join("");
  }

  // ---- 最近銷貨 ----
  const recent = sales.slice(0, 6);
  const tbody = document.getElementById("recent");
  if (!recent.length) tbody.innerHTML = `<tr><td colspan="5" class="empty">尚無銷貨紀錄</td></tr>`;
  else tbody.innerHTML = recent.map(s => `
    <tr>
      <td>${fmt.date(s.date)}</td>
      <td>${s.customer || "—"}</td>
      <td>${(s.lines||[]).map(l=>`${l.name}×${l.qty}`).join("、") || "—"}</td>
      <td class="num">${fmt.money(s.total)}</td>
      <td>${s.handlerName || s.createdByName || "—"}</td>
    </tr>`).join("");
</script>
</body>
</html>
