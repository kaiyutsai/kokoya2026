<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>果果家 KOKOYA · 登入</title>
<link rel="icon" href="assets/logo-fallback.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo-wrap">
      <img id="logoImg" src="assets/logo.png" alt="果果家"
           onerror="this.onerror=null;this.src='assets/logo-fallback.svg';">
    </div>
    <h1>果果家</h1>
    <div class="sub">KOKOYA</div>

    <button id="btnGoogle" class="btn google">
      <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.4-4.5 2.4-7.2 2.4-5.3 0-9.7-3.3-11.3-8L6 33.1C9.2 39.5 16 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.2 5.2C40.8 35.3 44 30 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
      使用 Google 帳號登入
    </button>

    <div id="msg" class="login-foot"></div>
    <div class="login-foot">僅限授權員工使用｜© 果果家 KOKOYA</div>
  </div>
</div>

<script type="module">
  import { auth, provider, signInWithPopup, signOut, onAuthStateChanged } from "./js/firebase-config.js";
  import { getUserProfile } from "./js/users.js";

  const $msg = document.getElementById("msg");

  // 已登入：直接進主控台
  onAuthStateChanged(auth, (user) => {
    if (user && getUserProfile(user.email)) {
      location.replace("dashboard.html");
    } else if (user && !getUserProfile(user.email)) {
      $msg.innerHTML = `此帳號 <b>${user.email}</b> 尚未授權，請聯繫管理員。`;
      signOut(auth);
    }
  });

  document.getElementById("btnGoogle").addEventListener("click", async () => {
    $msg.textContent = "登入中…";
    try {
      const result = await signInWithPopup(auth, provider);
      const profile = getUserProfile(result.user.email);
      if (!profile) {
        $msg.innerHTML = `此帳號 <b>${result.user.email}</b> 尚未授權，請聯繫管理員。`;
        await signOut(auth);
        return;
      }
      location.replace("dashboard.html");
    } catch (e) {
      console.error(e);
      $msg.textContent = "登入失敗：" + (e.message || e.code);
    }
  });
</script>
</body>
</html>
